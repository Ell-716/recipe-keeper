services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-keeper-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
      - PORT=8000
    volumes:
      - ./backend/recipes.json:/app/recipes.json
      - ./backend/comments.json:/app/comments.json
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/recipes')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    image: nginx:alpine
    container_name: recipe-keeper-frontend
    ports:
      - "5500:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
