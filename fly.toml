# Fly.io configuration for Recipe Keeper Backend
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT: Before deploying, set ALLOWED_ORIGINS as a secret:
# fly secrets set ALLOWED_ORIGINS="https://your-vercel-app.vercel.app"
#
# To create the volume:
# fly volumes create recipe_data --region iad --size 1

app = "recipe-keeper-backend"
primary_region = "iad"  # Washington, D.C. - change to your preferred region

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  DATA_DIR = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/recipes"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Persistent storage for recipes.json and comments.json
[mounts]
  source = "recipe_data"
  destination = "/app/data"
