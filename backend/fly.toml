# fly.toml app configuration file generated for recipe-keeper-backend on 2026-04-22T21:22:54+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'recipe-keeper-backend'
primary_region = 'ams'

[build]

[env]
  ENVIRONMENT = "production"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "recipe_data"
  destination = "/data"
  